# CI chain per the project constitution: validate -> lint -> typecheck -> test -> build -> smoke.
# Determinism and data-integrity checks are CI failures by design, not review catches.
# Every commit must carry a DCO sign-off; the check below enforces it on pull requests.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: DCO (every PR commit carries a sign-off)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=200
          bad=0
          for c in $(git rev-list origin/${{ github.base_ref }}..HEAD); do
            if ! git show -s --format=%B "$c" | grep -q '^Signed-off-by: '; then
              echo "missing sign-off: $c"; bad=1
            fi
          done
          exit $bad

      - name: Validate data (schemas, source IDs, string keys)
        run: pnpm validate

      - name: Lint (includes engine purity boundary)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Simulation smoke (headless batch)
        run: pnpm simulate -- --runs 100

      - name: Install browsers for determinism suite
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Cross-browser determinism (golden hashes in 3 engines)
        run: pnpm test:browser
